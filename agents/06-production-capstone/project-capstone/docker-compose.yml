services:
  agent:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  mcp-server:
    build: .
    command: ["uv", "run", "python", "-m", "capstone.mcp_server"]
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: capstone
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d capstone"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
